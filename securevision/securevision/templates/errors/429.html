{% extends "base.html" %}
{% block title %}Too Many Attempts (429){% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <span class="text-6xl block mb-4" role="img" aria-label="Clock">⏳</span>
    <h1 class="text-4xl font-bold text-white mb-3">Too Many Attempts</h1>
    <p class="text-slate-400 mb-8">For security, access has been temporarily paused. Please wait a few minutes before trying again.</p>
    <a href="{{ url_for('auth.login') }}"
       class="inline-flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white
              font-semibold px-6 py-2.5 rounded-lg text-sm transition-colors">
      ← Try Again
    </a>
  </div>
</div>
{% endblock %}
