{% extends "base.html" %}
{% block title %}Server Error (500){% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <span class="text-6xl block mb-4" role="img" aria-label="Warning sign">⚠️</span>
    <h1 class="text-4xl font-bold text-white mb-3">Something Went Wrong</h1>
    <p class="text-slate-400 mb-8">An unexpected server error occurred. Our team has been notified.</p>
    <a href="{{ url_for('auth.login') }}"
       class="inline-flex items-center gap-2 bg-brand-600 hover:bg-brand-500 text-white
              font-semibold px-6 py-2.5 rounded-lg text-sm transition-colors">
      ← Return to Login
    </a>
  </div>
</div>
{% endblock %}
